version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: magazine
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 2034
    env_file:
      - ./.env
    depends_on:
      - mysql
      - redis
      - minio
    ports:
      - "2034:2034"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:2034
    environment:
      NODE_ENV: production
      PORT: 1034
      NEXT_PUBLIC_READER_URL: https://reader.vidhyavibe.in
    env_file:
      - ./.env
    depends_on:
      - api
    ports:
      - "1034:1034"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:2034
    environment:
      NODE_ENV: production
      PORT: 3034
      NEXT_PUBLIC_READER_URL: https://reader.vidhyavibe.in
    env_file:
      - ./.env
    depends_on:
      - api
    ports:
      - "3034:3034"
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
